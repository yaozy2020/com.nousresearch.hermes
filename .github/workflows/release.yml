name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.27.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (for governance scripts)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preflight (version SSOT + repo hygiene)
        run: |
          chmod +x scripts/preflight.sh scripts/sync-version.py scripts/gen-audit.py
          bash scripts/preflight.sh

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps & build frontend
        run: |
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
          (cd app_src/ui-vue && (if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi))

      - name: Run tests
        run: npm test

      - name: Build fpk via fnpackup Docker
        id: build
        env:
          FNPAYLOAD: ${{ github.workspace }}/fnpayload
        run: |
          mkdir -p "$FNPAYLOAD"
          # 复制项目到 payload 目录（fnpackup 会读取 /app 下的内容）
          cp -a . "$FNPAYLOAD/"
          # 在 fnpackup 容器内执行 build.sh
          docker run --rm \
            -v "$FNPAYLOAD:/app" \
            -v "$FNPAYLOAD/dist:/dist" \
            snltty/fnpackup:v1.1.4 \
            /bin/bash -c "cd /app && bash build.sh"
          # 检查产物
          fpk=$(ls "$FNPAYLOAD"/com.nousresearch.hermes_*.fpk | head -n1)
          if [ -z "$fpk" ]; then
            echo "::error::fpk build failed, no output found"
            exit 1
          fi
          echo "fpk=$fpk" >> "$GITHUB_OUTPUT"
          # 复制产物到 workspace 供后续上传
          cp "$fpk" "${{ github.workspace }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Hermes Panel ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ github.workspace }}/com.nousresearch.hermes_*.fpk
