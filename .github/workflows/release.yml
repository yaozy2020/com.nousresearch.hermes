name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.27.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (for governance scripts)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preflight (version SSOT + repo hygiene)
        run: |
          chmod +x scripts/preflight.sh scripts/sync-version.py scripts/gen-audit.py
          bash scripts/preflight.sh

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fnpack
        run: |
          # fnpack 是飞牛官方打包器；优先尝试 npm 全局安装，失败则从官方仓库下载
          # NOTE: fnpack 的安装路径可能随官方调整；请按需固化版本号
          if ! command -v fnpack >/dev/null 2>&1; then
            echo "fnpack not pre-installed; CI 需要 fnpack 才能打包 fpk。"
            echo "目前依赖手动维护的 build.sh，本工作流仅做构建可达性验证。"
            exit 0
          fi

      - name: Install deps & build
        run: |
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
          (cd app_src/ui-vue && (if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi))

      - name: Run tests
        run: npm test

      - name: Build fpk via build.sh
        id: build
        run: |
          if ! command -v fnpack >/dev/null 2>&1; then
            echo "::warning::fnpack 不可用，跳过 fpk 构建。请手动 release。"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash build.sh
          fpk=$(ls com.nousresearch.hermes_*.fpk | head -n1)
          echo "fpk=$fpk" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.build.outputs.skipped != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Hermes Panel ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.fpk }}
