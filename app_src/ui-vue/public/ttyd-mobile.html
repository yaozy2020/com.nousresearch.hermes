<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d1117" />
  <title>Hermes 终端</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }
    #app {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      gap: 10px;
    }
    header .info {
      flex: 1 1 auto;
      min-width: 0;
    }
    header .title {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    header .meta {
      font-size: 11px; color: #8b949e;
      margin-top: 2px;
    }
    header .actions {
      display: flex; gap: 8px;
      flex: 0 0 auto;
    }
    .btn {
      appearance: none; border: none; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; font-weight: 500;
      background: #21262d; color: #c9d1d9;
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      min-height: 36px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: #30363d; }
    .btn.primary { background: #238636; color: #fff; }
    .btn.primary:active { background: #2ea043; }
    .btn.danger { background: #da3633; color: #fff; }
    .btn.danger:active { background: #f85149; }
    .btn svg { width: 16px; height: 16px; }
    #frame-wrap {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      background: #0d1117;
    }
    iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0d1117;
      text-align: center; padding: 24px;
    }
    #overlay .spinner {
      width: 36px; height: 36px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay .msg { font-size: 14px; color: #8b949e; }
    #overlay .err { color: #f85149; }
    #overlay .hint {
      margin-top: 12px; font-size: 12px; color: #8b949e; line-height: 1.5;
      max-width: 320px;
    }
    footer {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      background: #161b22;
      border-top: 1px solid #30363d;
    }
    /* v0.30.2: 双排工具栏 — 行 1 特殊键、行 2 工具按钮 */
    .toolbar {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    }
    .toolbar .row {
      display: flex; gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .toolbar .row::-webkit-scrollbar { display: none; }
    .toolbar .btn {
      flex: 0 0 auto;
      padding: 6px 10px;
      font-size: 12px;
      min-height: 32px;
      white-space: nowrap;
    }
    .toolbar .btn.key { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    /* 行 2 的工具按钮在小屏上稍突出一点 */
    .toolbar .row.tools .btn {
      background: #1f2937; border-color: #374151;
    }
    .toolbar .row.tools .btn#btn-find-url { background: #1f3a5f; border-color: #2563eb; }
    .toolbar .row.tools .btn#btn-copy-screen { background: #1f3a2c; border-color: #16a34a; }
    #toast {
      position: fixed; left: 50%; bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      background: rgba(22, 27, 34, 0.95);
      color: #c9d1d9;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
      border: 1px solid #30363d;
    }
    #toast.show { opacity: 1; }
    #debug {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(22, 27, 34, 0.96); color: #f85149;
      padding: 16px; border-radius: 12px; border: 1px solid #f85149;
      max-width: 86%; font-size: 12px; line-height: 1.5;
      z-index: 200; display: none; white-space: pre-wrap;
    }
    #debug.show { display: block; }
    .hidden { display: none !important; }

    /* URL picker — 用于把 ttyd 屏幕里的链接列出来，便于点开/复制 */
    #url-picker { position: fixed; inset: 0; z-index: 300; }
    #url-picker.hidden { display: none !important; }
    #url-picker .up-mask {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
    }
    #url-picker .up-card {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(92vw, 480px); max-height: 70vh; overflow: auto;
      background: #161b22; color: #c9d1d9;
      border: 1px solid #30363d; border-radius: 12px;
      padding: 14px; box-shadow: 0 10px 40px rgba(0,0,0,.6);
    }
    #url-picker .up-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #58a6ff; }
    #url-picker .up-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    #url-picker .up-row {
      display: flex; gap: 6px; align-items: center;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 10px;
    }
    #url-picker .up-row .url {
      flex: 1; font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px; word-break: break-all; color: #c9d1d9;
      max-height: 64px; overflow: auto;
    }
    #url-picker .up-row .btn-mini {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      border-radius: 4px; padding: 4px 8px; font-size: 11px; flex: 0 0 auto;
    }
    #url-picker .up-row .btn-mini.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    #url-picker .up-close {
      width: 100%; margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="info">
        <div class="title" id="cmd-title">Hermes 终端</div>
        <div class="meta" id="status-meta">正在启动…</div>
      </div>
      <div class="actions">
        <button class="btn" id="btn-keyboard" title="显示键盘">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><line x1="6" y1="8" x2="6" y2="8"></line><line x1="10" y1="8" x2="10" y2="8"></line><line x1="14" y1="8" x2="14" y2="8"></line><line x1="18" y1="8" x2="18" y2="8"></line><line x1="6" y1="12" x2="6" y2="12"></line><line x1="10" y1="12" x2="10" y2="12"></line><line x1="14" y1="12" x2="14" y2="12"></line><line x1="18" y1="12" x2="18" y2="12"></line><line x1="6" y1="16" x2="18" y2="16"></line></svg>
        </button>
        <button class="btn danger" id="btn-close" title="关闭终端">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </header>
    <div id="frame-wrap">
      <iframe id="term-frame" class="hidden"></iframe>
      <div id="overlay">
        <div class="spinner"></div>
        <div class="msg" id="overlay-msg">正在连接 ttyd 终端…</div>
        <div class="hint">若长时间无响应，请检查 hermes 是否已安装。</div>
      </div>
    </div>
    <footer>
      <div class="toolbar">
        <!-- 行 1：特殊按键 -->
        <div class="row keys">
          <button class="btn key" data-seq="\u0003" data-copy="Ctrl+C">Ctrl+C</button>
          <button class="btn key" data-seq="\t" data-copy="Tab">Tab</button>
          <button class="btn key" data-seq="\u001b" data-copy="Esc">Esc</button>
          <button class="btn key" data-seq="\u001b[A" data-copy="↑">↑</button>
          <button class="btn key" data-seq="\u001b[B" data-copy="↓">↓</button>
          <button class="btn key" data-seq="\u001b[D" data-copy="←">←</button>
          <button class="btn key" data-seq="\u001b[C" data-copy="→">→</button>
        </div>
        <!-- 行 2：工具按钮 -->
        <div class="row tools">
          <button class="btn" id="btn-font" title="切换字体大小">A±</button>
          <button class="btn" id="btn-copy-screen" title="复制全屏文本">📋 复制屏</button>
          <button class="btn" id="btn-find-url" title="提取链接到剪贴板">🔗 链接</button>
          <button class="btn" id="btn-paste">粘贴</button>
        </div>
      </div>
    </footer>
  </div>
  <!-- 链接选择器：点 🔗 链接 时弹出，列出屏幕上识别到的所有 URL -->
  <div id="url-picker" class="hidden">
    <div class="up-mask"></div>
    <div class="up-card">
      <div class="up-title">检测到的链接</div>
      <div class="up-list"></div>
      <button class="btn up-close">关闭</button>
    </div>
  </div>
  <div id="toast"></div>
  <div id="debug"></div>
  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const cmd = params.get('cmd') || 'setup';
      const frame = document.getElementById('term-frame');
      const overlay = document.getElementById('overlay');
      const overlayMsg = document.getElementById('overlay-msg');
      const statusMeta = document.getElementById('status-meta');
      const cmdTitle = document.getElementById('cmd-title');
      const toastEl = document.getElementById('toast');
      const debugEl = document.getElementById('debug');
      let started = false;

      function setDebug(msg) {
        debugEl.textContent = msg;
        debugEl.classList.add('show');
      }
      function appendDebug(msg) {
        debugEl.textContent += (debugEl.textContent ? '\n' : '') + msg;
        debugEl.classList.add('show');
      }

      const CMD_LABELS = {
        setup: 'hermes setup',
        model: 'hermes model',
        login: 'hermes login',
        gateway: 'hermes gateway setup',
        doctor: 'hermes doctor',
        status: 'hermes status'
      };
      cmdTitle.textContent = CMD_LABELS[cmd] || `hermes ${cmd}`;

      // 兼容 fnOS 应用网关前缀：/app/com-nousresearch-hermes/ttyd-mobile
      // 相对路径能自动带上网关前缀
      const API_START = './api/terminal/start';
      const API_STOP = './api/terminal/stop';
      const TTYD_PATH = './ttyd/';

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 1800);
      }

      function setOverlay(text, isError) {
        overlayMsg.textContent = text;
        if (isError) overlayMsg.classList.add('err');
        else overlayMsg.classList.remove('err');
      }

      async function start() {
        try {
          const res = await fetch(API_START, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cmd, mobile: true })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            setOverlay(`启动失败：${data.error || res.statusText || '未知错误'}`, true);
            statusMeta.textContent = '启动失败';
            return;
          }
          started = true;
          statusMeta.textContent = `PID ${data.pid} · ${data.args ? data.args.join(' ') : ''}`;
          frame.src = TTYD_PATH;
          frame.classList.remove('hidden');
          overlay.classList.add('hidden');
          showToast('终端已启动，点击终端区域唤起键盘');
          frame.addEventListener('load', () => {
            try {
              const doc = frame.contentDocument;
              if (doc && doc.body) {
                const s = doc.createElement('script');
                s.textContent = `
                  window.onerror = function(msg, url, line, col, err) {
                    parent.postMessage({type:'iframe-error', msg:String(msg), stack: err && err.stack ? String(err.stack) : ''}, '*');
                    return false;
                  };
                `;
                doc.body.appendChild(s);
              }
            } catch {}
          });
          window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'iframe-error') {
              appendDebug('iframe error: ' + JSON.stringify(e.data));
            }
          });
        } catch (e) {
          setOverlay(`启动失败：${e.message || '网络错误'}`, true);
          statusMeta.textContent = '启动失败';
        }
      }

      async function stop() {
        try {
          await fetch(API_STOP, { method: 'POST' });
          showToast('终端已关闭');
        } catch {}
        if (window.history.length > 1) window.history.back();
        else window.location.href = './';
      }

      document.getElementById('btn-close').addEventListener('click', stop);

      // 聚焦 iframe 以唤起键盘
      document.getElementById('btn-keyboard').addEventListener('click', () => {
        try {
          frame.contentWindow.focus();
          const doc = frame.contentDocument;
          if (doc) {
            const ta = doc.querySelector('.xterm-helper-textarea');
            if (ta) ta.focus();
            else doc.body.focus();
          }
        } catch {}
        showToast('已尝试聚焦终端');
      });

      const API_SEND = './api/terminal/send';
      const API_SIGNAL = './api/terminal/signal';

      async function sendSignal(signal, label) {
        if (!started) {
          showToast('终端尚未启动');
          return false;
        }
        try {
          const res = await fetch(API_SIGNAL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ signal })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            showToast(data.error || `${label} 发送失败`);
            return false;
          }
          return true;
        } catch (e) {
          showToast(`${label} 发送失败：` + (e.message || '网络错误'));
          return false;
        }
      }

      async function sendSequence(seq, label) {
        if (!started) {
          showToast('终端尚未启动');
          return false;
        }
        try {
          const res = await fetch(API_SEND, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input: seq })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            showToast(data.error || '发送失败，请重试');
            return false;
          }
          return true;
        } catch (e) {
          showToast('发送失败：' + (e.message || '网络错误'));
          return false;
        }
      }

      function decodeSeq(s) {
        return s.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
      }

      // 特殊键：通过后端代理直接发送到 ttyd WebSocket
      document.querySelectorAll('.toolbar .key').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const seq = decodeSeq(btn.dataset.seq || '');
          const label = btn.dataset.copy || btn.textContent;
          // Ctrl+C 用信号强制中断，其他键走输入流
          let ok = false;
          if (seq === '\u0003') {
            ok = await sendSignal('SIGINT', label);
          } else {
            ok = await sendSequence(seq, label);
          }
          if (ok) {
            showToast(`${label} 已发送`);
          } else {
            try {
              await navigator.clipboard.writeText(seq);
              showToast(`${label} 已复制，请粘贴到终端`);
            } catch {}
          }
        });
      });

      document.getElementById('btn-paste').addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          if (!text) return;
          const ok = await sendSequence(text, '粘贴');
          showToast(ok ? '已粘贴' : '剪贴板内容已复制，请手动粘贴');
        } catch (e) {
          showToast('无法读取剪贴板，请长按终端区域粘贴');
        }
      });

      // ====== v0.31: 字体 / 复制屏 / 链接提取 ======

      // 1. 字体大小循环：12 / 14 / 16 / 18 / 20 px，localStorage 持久化
      const FONT_SIZES = [12, 14, 16, 18, 20];
      const FONT_KEY = 'hermes-ttyd-font';
      let fontIdx = (() => {
        const saved = parseInt(localStorage.getItem(FONT_KEY) || '14', 10);
        const i = FONT_SIZES.indexOf(saved);
        return i >= 0 ? i : 1;
      })();
      function applyFont() {
        const size = FONT_SIZES[fontIdx];
        try {
          const doc = frame.contentDocument;
          if (!doc) return;
          let st = doc.getElementById('hermes-font-style');
          if (!st) {
            st = doc.createElement('style');
            st.id = 'hermes-font-style';
            doc.head.appendChild(st);
          }
          st.textContent = '.xterm, .xterm-rows, .xterm-helper-textarea { font-size: ' + size + 'px !important; }';
          window.dispatchEvent(new Event('resize'));
          frame.contentWindow && frame.contentWindow.dispatchEvent(new Event('resize'));
        } catch {}
        localStorage.setItem(FONT_KEY, String(size));
      }
      document.getElementById('btn-font').addEventListener('click', () => {
        fontIdx = (fontIdx + 1) % FONT_SIZES.length;
        applyFont();
        showToast('字体 ' + FONT_SIZES[fontIdx] + 'px');
      });
      frame.addEventListener('load', () => setTimeout(applyFont, 600));

      // 2. 读取 ttyd iframe 内 xterm 全屏文本（包含滚动缓冲区）
      function readScreenText() {
        try {
          const doc = frame.contentDocument;
          if (!doc) return '';
          // ttyd 用 xterm.js 渲染，每行是 .xterm-rows > div
          const rows = doc.querySelectorAll('.xterm-rows > div');
          if (!rows.length) {
            // 兜底：直接取 body 文本
            return (doc.body && doc.body.innerText) || '';
          }
          const lines = [];
          rows.forEach((row) => {
            // 用 textContent 而非 innerText，避免 xterm 的 hidden span 被忽略
            const t = (row.textContent || '').replace(/\u00a0/g, ' ').trimEnd();
            lines.push(t);
          });
          // 去除末尾空白行
          while (lines.length && !lines[lines.length - 1]) lines.pop();
          return lines.join('\n');
        } catch (e) {
          return '';
        }
      }

      async function copyText(text) {
        if (!text) return false;
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {}
        // 兜底：legacy execCommand
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return ok;
        } catch {
          return false;
        }
      }

      // 3. 复制全屏文本
      document.getElementById('btn-copy-screen').addEventListener('click', async () => {
        const text = readScreenText();
        if (!text) {
          showToast('暂未读到终端内容，请等终端就绪');
          return;
        }
        const ok = await copyText(text);
        showToast(ok ? '已复制 ' + text.split('\n').length + ' 行到剪贴板' : '复制失败，请检查浏览器权限');
      });

      // 4. 链接提取 — 屏幕里的所有 http/https/ws/file 链接
      const URL_RE = /\bhttps?:\/\/[^\s'"<>`]+|\bwss?:\/\/[^\s'"<>`]+/gi;
      function extractUrls(text) {
        if (!text) return [];
        const set = new Set();
        const list = [];
        const matches = text.match(URL_RE) || [];
        for (let raw of matches) {
          // 去掉行末标点
          raw = raw.replace(/[.,;:!?)\]}"']+$/, '');
          if (!set.has(raw)) {
            set.add(raw);
            list.push(raw);
          }
        }
        return list;
      }

      const urlPicker = document.getElementById('url-picker');
      const urlList = urlPicker.querySelector('.up-list');
      urlPicker.querySelector('.up-mask').addEventListener('click', () => urlPicker.classList.add('hidden'));
      urlPicker.querySelector('.up-close').addEventListener('click', () => urlPicker.classList.add('hidden'));

      function showUrlPicker(urls) {
        urlList.innerHTML = '';
        if (!urls.length) {
          const empty = document.createElement('div');
          empty.style.color = '#8b949e'; empty.style.fontSize = '13px';
          empty.textContent = '当前屏幕未识别到链接';
          urlList.appendChild(empty);
        } else {
          urls.forEach((u) => {
            const row = document.createElement('div');
            row.className = 'up-row';
            const span = document.createElement('div');
            span.className = 'url'; span.textContent = u;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'btn-mini'; copyBtn.textContent = '复制';
            copyBtn.addEventListener('click', async () => {
              const ok = await copyText(u);
              showToast(ok ? '已复制' : '复制失败');
            });
            const openBtn = document.createElement('button');
            openBtn.className = 'btn-mini primary'; openBtn.textContent = '打开';
            openBtn.addEventListener('click', () => {
              try {
                window.open(u, '_blank', 'noopener');
              } catch {
                showToast('无法新开标签，请手动复制');
              }
            });
            row.appendChild(span);
            row.appendChild(copyBtn);
            row.appendChild(openBtn);
            urlList.appendChild(row);
          });
        }
        urlPicker.classList.remove('hidden');
      }

      document.getElementById('btn-find-url').addEventListener('click', () => {
        const text = readScreenText();
        const urls = extractUrls(text);
        showUrlPicker(urls);
        if (urls.length === 1) {
          // 只有一个链接时自动复制 —— 主人最常见的初始化场景
          copyText(urls[0]).then((ok) => {
            if (ok) showToast('已复制唯一链接，可点「打开」');
          });
        }
      });

      window.addEventListener('beforeunload', () => {
        if (started) fetch(API_STOP, { method: 'POST', keepalive: true }).catch(() => {});
      });

      start();
    })();
  </script>
</body>
</html>
