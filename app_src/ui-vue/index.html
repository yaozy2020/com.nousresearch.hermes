<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/icon_64.PNG" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=public-sans:400,500,600,700" rel="stylesheet" />
  <title>Hermes AI 助手</title>
  <meta name="description" content="在飞牛 NAS 上管理 Hermes AI Agent 服务。">
  <!-- 兼容 fnOS 应用网关：URL 可能无尾斜杠。先把推断到的 base 写到 meta，再回落到 <base href> 让相对资源也能加载。
       useApi.ts 会优先读取 meta；这样即使未来 fnOS 网关前缀变化，也不会因为 fetch 拼错而失败。 -->
  <meta name="hermes-api-base" content="/" />
  <script>
    (function () {
      try {
        var pn = window.location.pathname;
        var m = pn.match(/^(\/app\/[^/]+)/);
        var base = m ? (m[1] + '/') : (pn.replace(/[^/]*$/, '') || './');
        var meta = document.querySelector('meta[name="hermes-api-base"]');
        if (meta) meta.setAttribute('content', base);
        document.write('<base href="' + base + '">');
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="app" class="isolate"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
